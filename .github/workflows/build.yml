name: Build & Deploy — Operation Radiohead Dossier

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run TypeScript Check
        run: bun run lint

  build-web:
    name: Build Web App (PWA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Web App
        run: bun run build

      - name: Upload dist Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [build-web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android-capacitor:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Compile Web App
        run: bun run build

      - name: Sync Capacitor Android
        run: bun run cap sync android

      - name: Ensure gradle-wrapper.jar is Valid
        run: |
          if ! unzip -t android/gradle/wrapper/gradle-wrapper.jar &>/dev/null; then
            echo "gradle-wrapper.jar is corrupt, downloading fresh copy..."
            rm -f android/gradle/wrapper/gradle-wrapper.jar
            curl -fsSL "https://github.com/gradle/gradle/raw/v9.4.1/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
            chmod 644 android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Grant Execute Permissions for Gradle
        run: chmod +x android/gradlew

      - name: Decode Keystore & Set Signing Env
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Release APK & AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: List Build Outputs
        run: find android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \)

      - name: Stage Android Artifacts
        run: |
          mkdir -p artifacts-to-upload
          find android -name "*.apk" -type f -exec cp {} artifacts-to-upload/ \;
          find android -name "*.aab" -type f -exec cp {} artifacts-to-upload/ \;

      - name: Upload Release APK/AAB Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-capacitor-artifacts
          path: artifacts-to-upload/*
          if-no-files-found: error

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check for iOS Project
        id: check-ios
        run: |
          if [ -f "ios/App/App.xcodeproj/project.pbxproj" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "iOS project not found — skipping iOS build."
          fi

      - name: Setup Bun
        if: steps.check-ios.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        if: steps.check-ios.outputs.exists == 'true'
        run: bun install

      - name: Build Web App
        if: steps.check-ios.outputs.exists == 'true'
        run: bun run build

      - name: Sync Capacitor iOS
        if: steps.check-ios.outputs.exists == 'true'
        run: bunx cap sync ios

      - name: Compile Xcode Project
        if: steps.check-ios.outputs.exists == 'true'
        run: |
          if [ -f "ios/App/App.xcworkspace" ]; then
            WORKSPACE_FLAG="-workspace ios/App/App.xcworkspace"
          else
            WORKSPACE_FLAG="-project ios/App/App.xcodeproj"
          fi
          xcodebuild \
            $WORKSPACE_FLAG \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package Simulator App Bundle
        if: steps.check-ios.outputs.exists == 'true'
        run: |
          mkdir -p ios-build
          cp -r build/Build/Products/Debug-iphonesimulator/App.app ios-build/OperationRadiohead.app
          zip -r ios-build/OperationRadiohead-iOS-Simulator.zip ios-build/OperationRadiohead.app

      - name: Upload iOS Simulator Binary
        if: steps.check-ios.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator
          path: ios-build/OperationRadiohead-iOS-Simulator.zip
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android-capacitor, build-ios]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Version
        id: version
        run: |
          echo "app_version=v$(node -p "require('./package.json').version")-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Download Web Artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: dist

      - name: Download Android APK/AAB
        uses: actions/download-artifact@v8
        with:
          name: android-capacitor-artifacts
          path: android-capacitor-artifacts
        continue-on-error: true

      - name: Download iOS Simulator
        uses: actions/download-artifact@v8
        with:
          name: ios-simulator
          path: ios-simulator
        continue-on-error: true

      - name: Stage Release Files
        env:
          TAG: ${{ steps.version.outputs.app_version }}
        run: |
          mkdir -p release-files

          # Zip the web build
          cd dist
          zip -r ../release-files/OperationRadiohead-Web-$TAG.zip .
          cd ..

          # Android APK & AAB
          APK_FILE=$(find android-capacitor-artifacts -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "release-files/OperationRadiohead-Android-$TAG.apk"
          fi
          AAB_FILE=$(find android-capacitor-artifacts -name "*.aab" -type f 2>/dev/null | head -1)
          if [ -n "$AAB_FILE" ]; then
            cp "$AAB_FILE" "release-files/OperationRadiohead-Android-$TAG.aab"
          fi

          # iOS Simulator
          IOS_ZIP=$(find ios-simulator -name "*.zip" -type f 2>/dev/null | head -1)
          if [ -n "$IOS_ZIP" ]; then
            cp "$IOS_ZIP" "release-files/"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.app_version }}
          name: Operation Radiohead Dossier ${{ steps.version.outputs.app_version }}
          make_latest: true
          body: |
            # Operation Radiohead Dossier — ${{ steps.version.outputs.app_version }}

            A secure, classified intelligence interface documenting the global neural hijacking crisis and the Stellarium Foundation's counter-measures.

            ## Install

            | Platform | Download |
            |----------|----------|
            | 🌐 **Web / PWA** | Deployed to GitHub Pages |
            | 📱 **Android** | [APK](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.app_version }}/OperationRadiohead-Android-${{ steps.version.outputs.app_version }}.apk) · [AAB](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.app_version }}/OperationRadiohead-Android-${{ steps.version.outputs.app_version }}.aab) |
            | 🍏 **iOS** (Simulator) | [ZIP](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.app_version }}/OperationRadiohead-iOS-Simulator.zip) |

            ---

            ## Dossier Sections

            | Section | Description |
            |---------|-------------|
            | **Home** | Executive summary of the ongoing crisis, attack timeline, and affected population counts |
            | **Psychology & Controls** | Analysis of neural conditioning mechanisms, reward circuitry hijack, and counter-technologies |
            | **Stellarium** | The blueprint and vision of John Victor — the "Water" AI suite and Enterprise Housing Pledge |
            | **Crisis** | Registry of atrocities, war crimes (Rome Statute violations), and victim intelligence |
            | **Support** | Sovereign funding protocols, Monero donation channels, and global sanctuary network |
            | **Contact** | Encrypted intelligence feed, walkie-talkie voice, and anonymous Tor messaging portal |

            ---

            **Codename:** Radiohead — Buried signal within the neural conditioning algorithm.
            **Attribution:** Strategic Asset of the Stellarium Foundation.

            > *"Do Good, Make Money, Have Fun."*
            > © 2026 Stellarium Foundation — All rights reserved.
          files: release-files/*
